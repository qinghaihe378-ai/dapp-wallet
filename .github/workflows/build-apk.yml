# 在 GitHub 云端构建 Debug APK，无需本机 Android Studio。
# 使用方式：仓库 → Actions →「Build Android Debug APK」→ Run workflow → 完成后在下方 Artifacts 下载 clawdex-debug-apk.zip，解压得到 app-debug.apk 传到手机安装。
# Action 版本与 Node：参见 https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
name: Build Android Debug APK

on:
  workflow_dispatch:

# 在官方 Action 全面默认 Node 24 前，强制子 Action 使用 Node 24，避免 Node 20 弃用提示
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v4

      - name: Install API 35 (compileSdk)
        run: |
          echo y | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true

      - name: npm ci & Vite build
        run: |
          npm ci
          npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - name: Assemble Debug APK
        working-directory: android
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List APK outputs
        run: |
          find android/app/build/outputs -type f 2>/dev/null || true
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "debug apk dir missing"

      - uses: actions/upload-artifact@v6
        with:
          name: clawdex-debug-apk
          path: android/app/build/outputs/apk/debug/
          if-no-files-found: error
          overwrite: true
          compression-level: 0
