# 在 GitHub 云端构建 Debug APK。
# 仓库 → Actions →「Build Android Debug APK」→ Run workflow → Artifacts 下载 clawdex-debug-apk.zip
# Node：参见 https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
name: Build Android Debug APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # 勿使用 cmdline-tools/latest/bin；v4 会把 sdkmanager 加入 PATH。
      # 显式列出 tools / platform-tools / API 35，避免以前静默失败的 sdkmanager 步骤导致缺 platform
      - uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-35 build-tools;35.0.0'

      - name: npm ci & Vite build
        run: |
          set -eo pipefail
          npm ci
          npm run build

      - name: Capacitor sync
        run: |
          set -eo pipefail
          npx cap sync android

      - name: Gradle heap (CI)
        run: |
          sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8/' android/gradle.properties

      - name: Assemble Debug APK
        working-directory: android
        run: |
          set -eo pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List APK outputs
        if: always()
        run: |
          find android/app/build/outputs -type f 2>/dev/null || true
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "debug apk dir missing"

      - uses: actions/upload-artifact@v6
        if: success()
        with:
          name: clawdex-debug-apk
          path: android/app/build/outputs/apk/debug/
          if-no-files-found: error
          overwrite: true
          compression-level: 0
